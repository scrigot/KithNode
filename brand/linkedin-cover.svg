<svg viewBox="0 0 1128 191" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark base -->
  <rect width="1128" height="191" fill="#0A1628"/>

  <!-- Subtle teal glow on right -->
  <defs>
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1128" height="191" fill="url(#glow)"/>

  <!-- Faint SVG dot grid (Bloomberg-ish texture, very subtle) -->
  <g fill="#FFFFFF" opacity="0.04">
    <circle cx="100" cy="20" r="1"/><circle cx="150" cy="20" r="1"/><circle cx="200" cy="20" r="1"/>
    <circle cx="250" cy="20" r="1"/><circle cx="300" cy="20" r="1"/><circle cx="350" cy="20" r="1"/>
    <circle cx="400" cy="20" r="1"/><circle cx="450" cy="20" r="1"/><circle cx="500" cy="20" r="1"/>
    <circle cx="550" cy="20" r="1"/><circle cx="600" cy="20" r="1"/><circle cx="650" cy="20" r="1"/>
    <circle cx="100" cy="60" r="1"/><circle cx="150" cy="60" r="1"/><circle cx="200" cy="60" r="1"/>
    <circle cx="250" cy="60" r="1"/><circle cx="300" cy="60" r="1"/><circle cx="350" cy="60" r="1"/>
    <circle cx="400" cy="60" r="1"/><circle cx="450" cy="60" r="1"/><circle cx="500" cy="60" r="1"/>
    <circle cx="550" cy="60" r="1"/><circle cx="600" cy="60" r="1"/><circle cx="650" cy="60" r="1"/>
    <circle cx="100" cy="170" r="1"/><circle cx="150" cy="170" r="1"/><circle cx="200" cy="170" r="1"/>
    <circle cx="250" cy="170" r="1"/><circle cx="300" cy="170" r="1"/>
  </g>

  <!-- Decorative warm-path mark on right edge -->
  <g transform="translate(980 95)">
    <path d="M -60 32 Q 0 -30 60 32" fill="none" stroke="#0EA5E9" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="-2" r="5" fill="#0EA5E9"/>
    <circle cx="-60" cy="32" r="11" fill="#FFFFFF"/>
    <circle cx="60" cy="32" r="11" fill="#0EA5E9"/>
  </g>

  <!-- Tagline (main message) -->
  <text x="260" y="102" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="-1">Your warmest path into finance.</text>

  <!-- URL below tagline (Bloomberg terminal accent) -->
  <text x="261" y="138" fill="#0EA5E9" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" font-weight="600" letter-spacing="3">KITHNODE.AI</text>
</svg>
