<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="panel.css">
<title>KithNode Clipper</title>
</head>
<body>
  <header>
    <span class="mark">Kith<b>Node</b> clipper</span>
  </header>

  <main>
    <button id="parse" class="btn primary">Read this profile</button>
    <div id="loading" class="loading" hidden>
      <span class="spinner"></span>
      <span>Reading the active LinkedIn profile…</span>
    </div>
    <p id="hint" class="hint">Open a linkedin.com/in/ profile, then click above.</p>

    <form id="form" hidden>
      <label>Name <input name="name" autocomplete="off"></label>
      <label>Title <input name="title" autocomplete="off"></label>
      <label>Firm <input name="firmName" autocomplete="off"></label>
      <label>Education <input name="education" autocomplete="off"></label>
      <label>Location <input name="location" autocomplete="off"></label>
      <label>Industry
        <select name="industry">
          <option value="">Select industry…</option>
          <option>AI Consulting</option>
          <option>AI Engineering</option>
          <option>Data Engineering</option>
          <option>Data Analytics</option>
          <option>Data Science</option>
          <option>Data Services</option>
          <option>ML Infrastructure</option>
          <option>LLM / RAG</option>
          <option>AI Product / Ops</option>
          <option>Enterprise AI</option>
          <option>Cloud / DevOps</option>
          <option>Cybersecurity</option>
          <option>Startup / Founder</option>
          <option>Venture / Ecosystem</option>
          <option>Consulting</option>
          <option>Other</option>
        </select>
      </label>
      <label>Email <input name="email" type="email" autocomplete="off" placeholder="optional"></label>
      <label>LinkedIn URL <input name="linkedInUrl" autocomplete="off"></label>
      <label>Notes <textarea name="notes" autocomplete="off" placeholder="why this person is useful to remember"></textarea></label>

      <div class="actions">
        <button type="button" id="copyJson" class="btn">Copy JSON</button>
        <button type="button" id="copyCsv" class="btn">Copy CSV row</button>
        <button type="button" id="saveProfile" class="btn">Save profile copy</button>
        <button type="button" id="send" class="btn primary">Add to Discover</button>
      </div>
      <p id="status" class="status"></p>
    </form>

    <details class="settings">
      <summary>Settings</summary>
      <label>KithNode URL
        <input id="baseUrl" placeholder="http://localhost:3000" autocomplete="off">
      </label>
      <label>Pairing token
        <input id="pairingToken" type="password" placeholder="knx_…" autocomplete="off">
      </label>
      <p class="hint">Create a revocable token in KithNode Integrations. The extension captures only the profile you open and review.</p>
    </details>
  </main>

  <script src="panel.js"></script>
</body>
</html>
