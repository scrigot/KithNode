<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        width: 360px;
        margin: 0;
        padding: 12px;
        background: #0a1628;
        color: #e2e8f0;
        font: 13px/1.4 -apple-system, system-ui, sans-serif;
      }
      h1 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #0ea5e9; margin: 0 0 8px; }
      label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin: 8px 0 2px; }
      input, textarea, select {
        width: 100%; box-sizing: border-box; background: #0f1f38; color: #e2e8f0;
        border: 1px solid rgba(255,255,255,.12); padding: 5px 6px; font: inherit; border-radius: 0;
      }
      textarea { resize: vertical; min-height: 38px; }
      .hint { font-size: 9px; color: #64748b; margin-top: 2px; }
      .row { display: flex; gap: 6px; align-items: center; }
      .row > * { flex: 1; }
      button {
        width: 100%; margin-top: 12px; background: rgba(14,165,233,.12); color: #0ea5e9;
        border: 1px solid rgba(14,165,233,.4); padding: 8px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .06em; cursor: pointer; border-radius: 0;
      }
      button:disabled { opacity: .4; cursor: default; }
      #status { margin-top: 10px; font-size: 12px; min-height: 16px; }
      .ok { color: #34d399; }
      .err { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>Capture to KithNode</h1>

    <div class="row">
      <div>
        <label>Name</label>
        <input id="name" />
      </div>
      <div style="flex:0 0 110px">
        <label>Save to</label>
        <select id="endpoint">
          <option value="https://kithnode.ai">Production</option>
          <option value="http://localhost:3000">Localhost</option>
        </select>
      </div>
    </div>

    <label>Headline</label>
    <input id="headline" />

    <div class="row">
      <div><label>Company</label><input id="company" /></div>
      <div><label>Location</label><input id="location" /></div>
    </div>

    <label>Skills (comma-separated)</label>
    <textarea id="skills"></textarea>

    <label>Experience — one per line: Title | Firm | Start | End</label>
    <textarea id="experiences"></textarea>

    <label>Education — one per line: School | Degree | Major</label>
    <textarea id="educations"></textarea>

    <label>Clubs / Orgs — one per line</label>
    <textarea id="clubs"></textarea>

    <label>Mutual connections (comma-separated names)</label>
    <textarea id="mutuals"></textarea>

    <div class="row">
      <div><label>High school</label><input id="highSchool" /></div>
      <div><label>Graduation year</label><input id="graduationYear" type="number" /></div>
    </div>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <label>Tags (comma-separated)</label>
    <input id="tags" />

    <div class="row">
      <div style="flex:0 0 auto">
        <label>Friend</label>
        <input id="isFriend" type="checkbox" style="width:auto" />
      </div>
      <div>
        <label>Speak frequency</label>
        <select id="speakFrequency">
          <option value=""></option>
          <option value="daily">daily</option>
          <option value="weekly">weekly</option>
          <option value="monthly">monthly</option>
          <option value="quarterly">quarterly</option>
          <option value="rarely">rarely</option>
        </select>
      </div>
      <div>
        <label>Last spoken</label>
        <input id="lastSpokenAt" type="date" />
      </div>
    </div>

    <button id="save" disabled>Parsing…</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
