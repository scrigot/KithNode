name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # The Prisma client lives in src/generated/prisma (gitignored), so it
      # must be generated before tsc/vitest can resolve @/generated/prisma.
      # prisma generate reads schema.prisma only — no DB connection needed.
      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
